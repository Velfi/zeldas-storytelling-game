[[endings]]
id = "case_closed"
trigger = "outcome.airtight"
outcome = "airtight"
title = "THE APPOINTMENT KEPT"
subtitle = "Vale House · The truth survives the fire"
summary = "The rejoined appointment note silences the room. Miriam alone knew Edgar summoned her to the study, and every movement of the statuette, the body, and the borrowed cane now answers to that meeting."
epilogue = "Miriam is taken from Vale House before dawn. Daniel withdraws his false dinner alibi; Elsie returns the stolen cash. Your first reconstruction enters the archive as a complete case: accusation, mechanism, concealment, and exclusion all proved."
canonical_timeline = "At 8:20 Edgar summoned Miriam to the study over the missing household accounts. At 8:24 she struck him with the bronze statuette. She cleaned it with lamp oil, moved his body through the study shutter, and staged a garden fall with Edgar's cane. The memo stub from his desk joins the burned fragment from Miriam's wastebin and proves she lied about the appointment."
tone = "success"
primary_label = "REVEAL CANONICAL ACCOUNT"
primary_action = "reveal"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

[[endings]]
id = "case_referred"
trigger = "outcome.correct_but_unproven"
outcome = "correct_but_unproven"
title = "THE RIGHT NAME, WITHOUT THE PROOF"
subtitle = "Vale House · The accusation goes forward"
summary = "You name Miriam, and the physical sequence is credible, but a missing link leaves the appointment or an innocent suspect insufficiently resolved."
epilogue = "The inspector records Miriam as the principal suspect and keeps Vale House under watch. The case continues without your authority to close it; what you established may still be enough for another investigator to finish."
tone = "warning"
primary_label = "RETRY THE CASE"
primary_action = "restart"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

[[endings]]
id = "case_incomplete"
trigger = "outcome.plausible_incomplete"
outcome = "plausible_incomplete"
title = "A THEORY THE HOUSE CAN STILL RESIST"
subtitle = "Vale House · Major questions remain"
summary = "Your accusation points toward Miriam, but the reconstruction leaves gaps large enough for the room to contest what happened."
epilogue = "No arrest is made tonight. Statements are preserved and the house remains sealed, but your account cannot yet carry the case."
tone = "warning"
primary_label = "RETRY THE CASE"
primary_action = "restart"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

[[endings]]
id = "wrong_accusation"
trigger = "outcome.wrong_accusation"
outcome = "wrong_accusation"
title = "THE WRONG PERSON LEAVES IN IRONS"
subtitle = "Vale House · The reconstruction breaks"
summary = "The suspect you accuse cannot satisfy the complete sequence. The contradictions you leave behind give the true killer room to escape."
epilogue = "By morning the error is public. The arrest is reversed, Vale House disperses, and the burned half of the appointment remains an unanswered warning."
tone = "failure"
primary_label = "RETRY THE CASE"
primary_action = "restart"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

[[endings]]
id = "case_unresolved"
trigger = "outcome.unresolved"
outcome = "unresolved"
title = "NO ACCUSATION"
subtitle = "Vale House · The inquiry is suspended"
summary = "Without a coherent accusation, the final confrontation ends in silence."
epilogue = "The evidence is boxed, the witnesses are released, and Edgar Vale's death remains open in the archive."
tone = "neutral"
primary_label = "RETRY THE CASE"
primary_action = "restart"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

[[endings]]
id = "night_overtakes_the_inquiry"
trigger = "out_of_time"
title = "THE LAST CANDLE FAILS"
subtitle = "Vale House · No final reconstruction"
summary = "The investigation clock expires before you can prepare a complete account of Edgar Vale's death."
epilogue = "The household is released at dawn. Evidence remains in the archive, but the opportunity to confront every witness under one roof is gone."
tone = "failure"
primary_label = "RETRY THE CASE"
primary_action = "restart"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

