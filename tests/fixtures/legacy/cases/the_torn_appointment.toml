subtitle = "Vale House · The accusation goes forward"
summary = "You name Miriam, and the physical sequence is credible, but a material gap remains—in the decisive contradiction, a competing lie, or the sequence itself."
epilogue = "The inspector records Miriam as the principal suspect and seals Vale House, but will not arrest on a reconstruction with one joint still loose. Daniel is ordered to submit a formal statement. Elsie is told not to leave the district. At the foot of the stairs, Miriam asks whether 'principal suspect' is an accusation or merely a phrase the inspector plans to regret. No one answers quickly enough."
