[[nodes]]
id = "approach_miriam_other_lies_detective"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "detective"
text = "'Mr Cross lied about watching you at dinner. Miss Ward lied to conceal why she crossed the gallery. One leaves your chair unobserved; the other places you at Edgar's door.'"
next = "approach_miriam_other_lies_shield"
ui = "dialogue"
transition = 0.180
position = [[250.00, 105.00]]

[[nodes]]
id = "approach_miriam_other_lies_shield"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "miriam"
text = "Miriam regards them across the cold table. 'Your case rests on an adulterer and a thief discovering honesty at a convenient hour.'"
next = "approach_miriam_other_lies_daniel"
ui = "dialogue"
transition = 0.180
position = [[470.00, 105.00]]

[[nodes]]
id = "approach_miriam_other_lies_daniel"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "daniel"
text = "'My cowardice explains my statement. It does not put you back at dinner.'"
next = "approach_miriam_other_lies_elsie"
ui = "dialogue"
transition = 0.180
position = [[690.00, 105.00]]

[[nodes]]
id = "approach_miriam_other_lies_elsie"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "elsie"
text = "Elsie lays the sixteen pounds beside Daniel's folded note. 'And this does not change which door I saw you open.'"
next = "approach_miriam_other_lies_democratic"
ui = "dialogue"
transition = 0.180
position = [[910.00, 105.00]]

[[nodes]]
id = "approach_miriam_other_lies_democratic"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "miriam"
text = "'How democratic. Vale House absolves its servants and solicitors by putting the mistress on trial.'"
next = "approach_miriam_other_lies_separate"
ui = "dialogue"
transition = 0.180
position = [[1130.00, 105.00]]

[[nodes]]
id = "approach_miriam_other_lies_separate"
scene = "scene_approach_miriam_other_lies"
kind = "line"
speaker = "detective"
text = "'Their lies explain what they protected. Yours must explain why one witness lost you and another found you at Edgar's door.'"
