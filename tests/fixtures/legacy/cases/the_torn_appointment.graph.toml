[[nodes]]
id = "approach_miriam_accounts_possibility"
scene = "scene_approach_miriam_accounts"
kind = "line"
speaker = "miriam"
text = "'Possibility. A room, a journey, one unaccounted-for hour. Edgar regarded anything he could not audit as theft.'"
next = "approach_miriam_accounts_last"
ui = "dialogue"
transition = 0.180
position = [[1130.00, 105.00]]

[[nodes]]
id = "approach_miriam_accounts_last"
scene = "scene_approach_miriam_accounts"
kind = "line"
speaker = "miriam"
text = "'Money does not become stolen merely because a dead man circled it in red.'"
next = "approach_miriam_accounts_end"
