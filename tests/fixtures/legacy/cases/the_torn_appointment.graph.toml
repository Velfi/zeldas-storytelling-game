speaker = "detective"
text = "'Red pencil is not a verdict. Your answer may be. The transfers bear your initials, and there are no receipts.'"
next = "approach_miriam_accounts_reply"
ui = "dialogue"
transition = 0.180
position = [[470.00, 105.00]]

[[nodes]]
id = "approach_miriam_accounts_reply"
scene = "scene_approach_miriam_accounts"
kind = "line"
speaker = "miriam"
text = "Her thumb settles over the initials. 'Household advances. Receipts go missing. Edgar preferred initials; they made every ordinary expense look like a confidence.'"
next = "approach_miriam_accounts_purchase"
ui = "dialogue"
transition = 0.180
position = [[690.00, 105.00]]

[[nodes]]
id = "approach_miriam_accounts_purchase"
scene = "scene_approach_miriam_accounts"
kind = "line"
speaker = "detective"
text = "'What did these advances purchase?'"
