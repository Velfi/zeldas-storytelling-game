[[nodes]]
id = "arrival_elsie_name"
scene = "scene_arrival"
kind = "line"
speaker = "elsie"
text = "Elsie crosses the room with a wine-stained cloth over one arm. 'Elsie Ward. I keep the house. Mrs Vale found the garden doors open. I found Mr Vale.'"
