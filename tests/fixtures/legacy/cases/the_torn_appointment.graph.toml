[[nodes]]
id = "arrival_miriam_name"
scene = "scene_arrival"
kind = "line"
speaker = "miriam"
text = "'Detective. Miriam Vale.' She offers her hand, then lets it fall. 'I would say you were welcome, but neither of us would believe it.'"
next = "arrival_miriam_control"
ui = "dialogue"
transition = 0.180
position = [[470.00, 105.00]]

[[nodes]]
id = "arrival_miriam_control"
scene = "scene_arrival"
kind = "line"
speaker = "miriam"
text = "'Edgar is in the garden. I have kept everyone away from him.'"
