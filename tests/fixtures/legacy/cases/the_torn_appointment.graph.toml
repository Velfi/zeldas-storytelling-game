[[nodes]]
id = "arrival_daniel_name"
scene = "scene_arrival"
kind = "line"
speaker = "daniel"
text = "'Daniel Cross. The family solicitor—and, tonight, a dinner guest. I expect that makes me a witness before it makes me useful.'"
