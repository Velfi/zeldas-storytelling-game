[[nodes]]
id = "arrival_constable"
scene = "scene_arrival"
kind = "line"
speaker = "constable"
text = "Lieutenant. Mr Vale is in the moon garden. No one has touched the body. The household is waiting inside; that is the last point on which they all agree."
next = "arrival_miriam_name"
