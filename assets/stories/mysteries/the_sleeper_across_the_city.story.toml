node = "opening_vivian"
character = "vivian"
prompt = "Tell me about Hugo Quill. What did they want tonight?"
response = "Vivian folds the timetable. 'Hugo promised each of us ten minutes before Union Depot. He treated a railway circuit as though it were a board agenda.'"
clue = ""
interaction = ""
requires = ["vivian_room_claim"]
unlocks = ["account_ready_vivian"]

[[mystery.dialogue]]
node = "account_vivian"
character = "vivian"
prompt = "Which compartment did you follow Hugo to?"
response = "'First the club, then the gallery, then Halcyon. You make institutions answer for every private arrangement.' Vivian answers with timetable confidence. 'Compartment four.'"
clue = ""
interaction = ""
requires = ["vivian_room_claim", "account_ready_vivian"]
unlocks = ["followup_vivian"]

[[mystery.dialogue]]
node = "approach_vivian"
character = "vivian"
prompt = "Then account for the baggage dust and rope fiber."
response = "'I saw the blue robe enter and the attendant lock the corridor. His name was printed beside it; there was no reason to inspect the face.'"
clue = "clue_vivian_room_testimony"
interaction = ""
requires = ["clue_baggage_trace", "vivian_room_claim", "followup_vivian"]
unlocks = ["clue_vivian_room_testimony", "marigold_reconstruction"]

[[mystery.dialogue]]
node = "opening_eamon"
character = "eamon"
prompt = "Tell me about Hugo Quill. What did they want tonight?"
response = "Eamon turns a ticket sleeve over. 'He offered me a room exchange, then asked what proof I had brought. He expected publication more than danger.'"
clue = ""
interaction = ""
requires = ["claim_eamon_secret"]
unlocks = ["account_ready_eamon"]

[[mystery.dialogue]]
node = "account_eamon"
character = "eamon"
prompt = "Why were you travelling under Hugo's booking?"
response = "Eamon turns both ticket sleeves face down. 'Hugo offered an exchange when he recognized me. He preferred my compartment; I preferred his anonymity.'"
clue = ""
interaction = ""
requires = ["claim_eamon_secret", "account_ready_eamon"]
unlocks = ["followup_eamon"]

[[mystery.dialogue]]
node = "approach_eamon"
character = "eamon"
prompt = "Then account for the compartment transfer blood."
response = "'The conductor changed the rooms, not the tags. Anyone reading the register afterward would follow the wrong man.'"
clue = "clue_eamon_identity"
interaction = ""
requires = ["clue_transfer_blood", "claim_eamon_secret", "followup_eamon"]
unlocks = ["clue_eamon_identity", "marigold_reconstruction"]

[[mystery.dialogue]]
node = "opening_leila"
character = "leila"
prompt = "Tell me about Hugo Quill. What did they want tonight?"
response = "Leila taps the lounge rhythm once. 'He asked me to sing at the foundation benefit again. I said no. We parted before Union Depot, without the quarrel he seemed to want.'"
clue = ""
interaction = ""
requires = ["claim_leila_secret"]
unlocks = ["account_ready_leila"]

[[mystery.dialogue]]
node = "account_leila"
