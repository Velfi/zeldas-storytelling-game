[[endings]]
id = "case_closed"
title = "THE APPOINTMENT KEPT"
summary = "The rejoined appointment note silences the room. Miriam denied the summons, yet its missing half was found burned in her sitting-room wastebin; the weapon, body route, and staged cane complete the account."
condition_id = "condition.always"
priority = 0

[[endings]]
id = "case_referred"
title = "THE RIGHT NAME, WITHOUT THE PROOF"
summary = "You name Miriam, and the physical sequence is credible, but a material gap remains—in the decisive contradiction, a competing lie, or the sequence itself."
condition_id = "condition.always"
priority = 0

[[endings]]
id = "case_incomplete"
title = "A THEORY THE HOUSE CAN STILL RESIST"
summary = "Your accusation points toward Miriam, but the reconstruction leaves gaps large enough for the room to contest what happened."
condition_id = "condition.always"
priority = 0

[[endings]]
id = "wrong_accusation"
title = "THE WRONG PERSON LEAVES IN IRONS"
summary = "The sequence you established cannot be reconciled with the person you accuse. By forcing the evidence toward the wrong name, you give the true killer room to escape."
condition_id = "condition.always"
priority = 0

[[endings]]
id = "case_unresolved"
title = "NO ACCUSATION"
summary = "Without a coherent accusation, the final confrontation ends in silence."
condition_id = "condition.always"
priority = 0

[[endings]]
id = "night_overtakes_the_inquiry"
title = "THE CLOCK RUNS OUT"
summary = "The investigation clock reaches zero before you can prepare a complete account of Edgar Vale's death."
condition_id = "condition.always"
priority = 0

