[[mystery.endings]]
ending = "case_closed"
trigger = "outcome.airtight"
outcome = "airtight"
subtitle = "Vale House · The truth survives the fire"
epilogue = "Before dawn, Daniel surrenders Miriam's folded note without another objection. Elsie counts sixteen pounds back into Edgar's drawer. Miriam leaves the torn appointment crooked on the table when the constable takes her away—the one detail in Vale House she can no longer correct."
canonical_timeline = "At 8:15 the study shutter closed automatically, cutting off the dining room's view of the window and garden. At 8:20 Edgar summoned Miriam to the study over the missing household accounts. Daniel waited alone in the gallery for the meeting she had promised him. At 8:24 Miriam struck Edgar with the bronze statuette, cleaned it with lamp oil, moved his body through the terrace door, and staged a garden fall with his cane. Elsie saw Miriam enter but kept silent because Miriam had seen her crossing the gallery with sixteen stolen pounds still in her apron. Miriam tried to burn her half of the summons, then returned to dinner at 8:33; Daniel lied that she had never left. The surviving fragment joins Edgar's memo stub and proves the denial that none of their other lies could protect."
tone = "success"
primary_label = "REVEAL CANONICAL ACCOUNT"
primary_action = "reveal"
secondary_label = "RETURN TO CAMPAIGN"
secondary_action = "campaign"

