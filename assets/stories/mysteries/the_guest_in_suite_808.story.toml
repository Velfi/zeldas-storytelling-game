[[mystery.dialogue]]
node = "account_estelle"
character = "estelle"
prompt = "How did you know the connecting door sticks at the floor?"
response = "'The Marigold Club may survive public theories; a hotel does not.' Estelle corrects you at once. 'There is no guest door between 808 and 810. There is a sealed service opening.'"
clue = ""
interaction = ""
requires = ["estelle_door_claim", "account_ready_estelle"]
